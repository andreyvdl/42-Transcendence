{% load i18n %}
{% language 'en' %}
<!DOCTYPE html>
<html lang={{ lang }}>
	<head>
			<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
	</head>
	<body>
		<div class="d-flex flex-row align-items-end">

			<div class="p-2 align-items-end">
				<h2>{% translate "Olá" %}, <span>{{ name }}</span></h2>
			</div>
			<div class="p-2">
				<h2>{% translate "CLASSE" %}: {{ ratio }}</h2>
			</div>

		</div>
		<div class="d-flex justify-content-evenly">
			<a href="/play?ai=true"><button class="btn btn-success">{% translate "Tutorial" %}</button></a>
			<a href="/play?ai=false"><button class="btn btn-warning">{% translate "Rankeada" %}</button></a>
		</div>
	</body>
</html>
{% endlanguage %}
